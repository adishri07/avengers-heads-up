<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avengers Heads Up Pro</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0b0f1a, #1a2238);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-weight: 600;
    letter-spacing: 1px;
}

/* Top Bar */
.top-bar {
    display: flex;
    justify-content: space-around;
    margin-top: 15px;
    font-size: 18px;
}

/* Card */
#card {
    margin: 40px auto;
    width: 80%;
    max-width: 350px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    border-radius: 20px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    transition: all 0.3s ease;
}

/* Button */
button {
    padding: 15px 30px;
    font-size: 18px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Animations */
.flash-correct {
    background: #00c853 !important;
    transform: scale(1.1);
}

.flash-skip {
    background: #d50000 !important;
    transform: scale(1.1);
}

.fade {
    opacity: 0;
    transform: translateY(20px);
}
</style>
</head>

<body>

<h1>🦸 Heads Up Pro</h1>

<div class="top-bar">
    <div id="score">Score: 0</div>
    <div id="timer">60s</div>
</div>

<div id="card">Tap Start 🎮</div>

<button onclick="startGame()">Start Game</button>

<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="skipSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
const cards = [
"Iron Man","Captain America","Thor","Hulk","Black Widow","Hawkeye",
"Spider-Man","Doctor Strange","Scarlet Witch","Vision","Black Panther",
"Ant-Man","Wasp","Falcon","Winter Soldier","Star-Lord",
"Thanos","Loki","Nick Fury","Gamora","Drax","Groot","Nebula","Mantis"
];

let shuffled = [];
let index = 0;
let timeLeft = 60;
let timer;
let score = 0;
let canTilt = true;

function shuffle() {
    shuffled = [...cards].sort(() => Math.random() - 0.5);
    index = 0;
}

function nextCard() {
    if (index >= shuffled.length) shuffle();
    
    const card = document.getElementById("card");
    card.classList.add("fade");

    setTimeout(() => {
        card.innerText = shuffled[index++];
        card.classList.remove("fade");
    }, 200);
}

function startGame() {
    score = 0;
    timeLeft = 60;
    shuffle();
    nextCard();

    document.getElementById("score").innerText = "Score: 0";

    // iPhone permission
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(res => {
            if (res === "granted") {
                window.addEventListener("deviceorientation", handleTilt);
            }
        });
    } else {
        window.addEventListener("deviceorientation", handleTilt);
    }

    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft + "s";

        if (timeLeft <= 0) {
            clearInterval(timer);
            document.getElementById("card").innerText = "⏰ Game Over";
            window.removeEventListener("deviceorientation", handleTilt);
        }
    }, 1000);
}

function handleTilt(e) {
    if (!canTilt) return;

    let tilt = e.beta;
    const card = document.getElementById("card");

    if (tilt > 30) {
        canTilt = false;
        score++;
        document.getElementById("score").innerText = "Score: " + score;

        card.classList.add("flash-correct");
        document.getElementById("correctSound").play();
        navigator.vibrate?.(100);

        setTimeout(() => {
            card.classList.remove("flash-correct");
            nextCard();
            canTilt = true;
        }, 700);
    }

    else if (tilt < -30) {
        canTilt = false;

        card.classList.add("flash-skip");
        document.getElementById("skipSound").play();
        navigator.vibrate?.(200);

        setTimeout(() => {
            card.classList.remove("flash-skip");
            nextCard();
            canTilt = true;
        }, 700);
    }
}
</script>

</body>
</html>
